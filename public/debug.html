<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InCampus Debug</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.6;
    }
    h1 {
      color: #2563eb;
    }
    h2 {
      color: #4b5563;
      margin-top: 30px;
    }
    pre {
      background-color: #f3f4f6;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px 0;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .error {
      color: #dc2626;
      font-weight: bold;
    }
    .success {
      color: #16a34a;
      font-weight: bold;
    }
    .action-buttons {
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>InCampus Debug Page</h1>
  <p>This page helps diagnose issues with the InCampus application.</p>
  
  <div class="action-buttons">
    <button onclick="clearAllStorage()">Clear All Storage & Reload</button>
    <button onclick="checkAuthState()">Check Auth State</button>
    <button onclick="forceLogin()">Force Login State</button>
    <button onclick="goToMainApp()">Go To Main App</button>
  </div>

  <h2>Local Storage Contents</h2>
  <pre id="localStorage"></pre>

  <h2>Session Storage Contents</h2>
  <pre id="sessionStorage"></pre>

  <h2>Console Logs</h2>
  <pre id="consoleLog"></pre>

  <script>
    // Override console.log to capture logs
    const originalConsoleLog = console.log;
    const originalConsoleError = console.error;
    const originalConsoleWarn = console.warn;
    const logHistory = [];

    console.log = function() {
      logHistory.push(['log', ...arguments]);
      originalConsoleLog.apply(console, arguments);
      updateConsoleLog();
    };

    console.error = function() {
      logHistory.push(['error', ...arguments]);
      originalConsoleError.apply(console, arguments);
      updateConsoleLog();
    };

    console.warn = function() {
      logHistory.push(['warn', ...arguments]);
      originalConsoleWarn.apply(console, arguments);
      updateConsoleLog();
    };

    function updateConsoleLog() {
      const consoleLogElement = document.getElementById('consoleLog');
      consoleLogElement.innerHTML = logHistory.map(entry => {
        const type = entry.shift();
        let prefix = '';
        if (type === 'error') prefix = '<span class="error">[ERROR]</span> ';
        if (type === 'warn') prefix = '<span style="color: orange">[WARN]</span> ';
        return prefix + entry.map(item => {
          try {
            return typeof item === 'object' ? JSON.stringify(item, null, 2) : item;
          } catch (e) {
            return String(item);
          }
        }).join(' ');
      }).join('\n');
    }

    // Function to display localStorage contents
    function displayStorageContents() {
      const localStorageElement = document.getElementById('localStorage');
      const sessionStorageElement = document.getElementById('sessionStorage');
      
      try {
        const localStorageItems = {};
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          try {
            // Try to parse as JSON
            const value = localStorage.getItem(key);
            try {
              localStorageItems[key] = JSON.parse(value);
            } catch {
              localStorageItems[key] = value;
            }
          } catch (e) {
            localStorageItems[key] = `[Error reading value: ${e.message}]`;
          }
        }
        localStorageElement.textContent = JSON.stringify(localStorageItems, null, 2);
      } catch (e) {
        localStorageElement.textContent = `Error accessing localStorage: ${e.message}`;
      }
      
      try {
        const sessionStorageItems = {};
        for (let i = 0; i < sessionStorage.length; i++) {
          const key = sessionStorage.key(i);
          try {
            const value = sessionStorage.getItem(key);
            try {
              sessionStorageItems[key] = JSON.parse(value);
            } catch {
              sessionStorageItems[key] = value;
            }
          } catch (e) {
            sessionStorageItems[key] = `[Error reading value: ${e.message}]`;
          }
        }
        sessionStorageElement.textContent = JSON.stringify(sessionStorageItems, null, 2);
      } catch (e) {
        sessionStorageElement.textContent = `Error accessing sessionStorage: ${e.message}`;
      }
    }

    // Function to clear all storage
    function clearAllStorage() {
      try {
        console.log("Clearing all storage...");
        localStorage.clear();
        sessionStorage.clear();
        console.log("Storage cleared successfully");
        displayStorageContents();
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } catch (e) {
        console.error("Error clearing storage:", e);
      }
    }

    // Function to check auth state
    function checkAuthState() {
      console.log("Checking authentication state...");
      const token = localStorage.getItem('token');
      const authState = localStorage.getItem('authState');
      const isAuthenticated = localStorage.getItem('isAuthenticated');
      const profileSetupComplete = localStorage.getItem('profileSetupComplete');
      
      console.log({
        hasToken: !!token,
        hasAuthState: !!authState,
        isAuthenticated,
        profileSetupComplete
      });
      
      if (token) {
        try {
          // Try to decode the token
          const parts = token.split('.');
          if (parts.length === 3) {
            const payload = JSON.parse(atob(parts[1]));
            console.log("Token payload:", payload);
          }
        } catch (e) {
          console.error("Error decoding token:", e);
        }
      }
    }

    // Function to force login state
    function forceLogin() {
      console.log("Forcing login state...");
      
      // Create a mock user
      const mockUser = {
        id: "user_" + Date.now(),
        name: "Debug User",
        email: "debug@example.com",
        universityId: "DEBUG/USER/123",
        role: "student",
        avatar: "",
        bio: "Debug user for testing"
      };
      
      // Create auth state
      const authState = {
        isAuthenticated: true,
        user: mockUser,
        loading: false,
        error: null,
        profileSetupComplete: true,
        timestamp: Date.now()
      };
      
      // Generate a token
      const token = "debug_token_" + Date.now();
      
      // Store in localStorage
      localStorage.setItem('token', token);
      localStorage.setItem('authState', JSON.stringify(authState));
      localStorage.setItem('isAuthenticated', 'true');
      localStorage.setItem('profileSetupComplete', 'true');
      localStorage.setItem('setupComplete', 'true');
      localStorage.setItem('userData', JSON.stringify(mockUser));
      localStorage.setItem('currentPage', 'feed');
      
      console.log("Login state forced successfully");
      displayStorageContents();
    }

    // Function to go to main app
    function goToMainApp() {
      window.location.href = '/';
    }

    // Initial display
    displayStorageContents();
    console.log("Debug page loaded at", new Date().toISOString());
  </script>
</body>
</html>
