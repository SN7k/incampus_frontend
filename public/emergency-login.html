<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InCampus Emergency Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-b from-blue-800 to-blue-600 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
    <div class="text-center mb-6">
      <h2 class="text-3xl font-bold text-blue-900 mb-2">InCampus Emergency Login</h2>
      <p class="text-gray-600">This page bypasses the normal authentication flow</p>
      <div id="message" class="mt-2 text-sm text-yellow-600 bg-yellow-50 p-2 rounded hidden"></div>
    </div>
    
    <div id="success-message" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 hidden">
      Login successful! Opening the main site...
    </div>
    
    <form id="login-form">
      <div id="error-message" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 hidden"></div>
      
      <div class="flex space-x-4 mb-4">
        <button
          type="button"
          id="student-btn"
          class="flex-1 py-2 px-4 rounded-md transition-colors bg-blue-800 text-white"
          onclick="setRole('student')"
        >
          Student
        </button>
        <button
          type="button"
          id="faculty-btn"
          class="flex-1 py-2 px-4 rounded-md transition-colors bg-gray-100 text-gray-700"
          onclick="setRole('faculty')"
        >
          Faculty
        </button>
      </div>
      
      <div class="mb-4">
        <label for="identifier" class="block text-sm font-medium text-gray-700 mb-1" id="identifier-label">
          Student ID or Email
        </label>
        <input
          id="identifier"
          type="text"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="BWU/ABC/00/000 or your email"
          required
        />
      </div>
      
      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          id="password"
          type="password"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter your password"
          required
        />
      </div>
      
      <button
        type="submit"
        id="login-btn"
        class="w-full bg-blue-800 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      >
        Login
      </button>
      
      <div class="mt-4 text-center text-sm text-gray-600">
        This is an emergency login page that bypasses the normal authentication flow.
        <br />
        After login, the main site will open in a new tab.
      </div>
    </form>
  </div>

  <script>
    // Initialize variables
    let role = 'student';
    
    // Clear any problematic localStorage and sessionStorage items
    function clearStorageItems() {
      localStorage.removeItem('authError');
      localStorage.removeItem('inLogoutLoop');
      localStorage.removeItem('forceLogout');
      localStorage.removeItem('preventRedirectLoop');
      localStorage.removeItem('justCompletedRegistration');
      localStorage.removeItem('redirectAfterRegistration');
      localStorage.removeItem('bypassTokenVerification');
      localStorage.removeItem('comingFromRegistration');
      localStorage.removeItem('inRegistrationFlow');
    }
    
    // Set the role (student or faculty)
    function setRole(newRole) {
      role = newRole;
      
      // Update UI
      if (newRole === 'student') {
        document.getElementById('student-btn').className = 'flex-1 py-2 px-4 rounded-md transition-colors bg-blue-800 text-white';
        document.getElementById('faculty-btn').className = 'flex-1 py-2 px-4 rounded-md transition-colors bg-gray-100 text-gray-700';
        document.getElementById('identifier-label').textContent = 'Student ID or Email';
        document.getElementById('identifier').placeholder = 'BWU/ABC/00/000 or your email';
      } else {
        document.getElementById('student-btn').className = 'flex-1 py-2 px-4 rounded-md transition-colors bg-gray-100 text-gray-700';
        document.getElementById('faculty-btn').className = 'flex-1 py-2 px-4 rounded-md transition-colors bg-blue-800 text-white';
        document.getElementById('identifier-label').textContent = 'Email';
        document.getElementById('identifier').placeholder = 'Enter your email';
      }
    }
    
    // Handle form submission
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Get form values
      const identifier = document.getElementById('identifier').value;
      const password = document.getElementById('password').value;
      
      // Validate form
      if (!identifier) {
        showError(role === 'student' ? 'Student ID or email is required' : 'Email is required');
        return;
      }
      
      if (!password) {
        showError('Password is required');
        return;
      }
      
      // Check if the identifier is an email
      const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(identifier);
      
      // If it's a student and not an email, validate the university ID format
      if (role === 'student' && !isEmail) {
        const idPattern = /^[A-Z]+\/[A-Z]+\/\d+\/\d+$|^[A-Z]+\/[A-Z]+\/[A-Z]+\/\d+$/;
        if (!idPattern.test(identifier)) {
          showError('Invalid university ID format. Example: BWU/BCA/20/123');
          return;
        }
      }
      
      // Show loading state
      const loginBtn = document.getElementById('login-btn');
      loginBtn.textContent = 'Logging in...';
      loginBtn.disabled = true;
      
      try {
        // Create the login payload
        const loginPayload = {
          password,
          role
        };
        
        // Add the appropriate identifier field
        if (isEmail) {
          loginPayload.email = identifier;
        } else {
          loginPayload.universityId = identifier;
        }
        
        console.log('Emergency login attempt with payload:', { ...loginPayload, password: '[REDACTED]' });
        
        // Clear any existing storage items
        clearStorageItems();
        
        // Make a direct API call to the backend
        const response = await axios.post('https://incampus-backend.onrender.com/api/auth/login', loginPayload, {
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          }
        });
        
        if (response.data.status === 'success') {
          const { token, user } = response.data.data;
          
          console.log('Emergency login successful');
          
          // Clear all localStorage first to remove any problematic data
          localStorage.clear();
          sessionStorage.clear();
          
          // Store token and user data
          localStorage.setItem('token', token);
          localStorage.setItem('user', JSON.stringify(user));
          sessionStorage.setItem('token', token);
          sessionStorage.setItem('user', JSON.stringify(user));
          
          // Set flags to indicate successful login
          localStorage.setItem('emergencyLogin', 'true');
          localStorage.setItem('isAuthenticated', 'true');
          
          // Show success message
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('success-message').classList.remove('hidden');
          
          // Wait a moment before redirecting
          setTimeout(() => {
            // Create a new window with the main site
            const mainWindow = window.open('about:blank', '_blank');
            
            if (mainWindow) {
              // Create a form to post the token to the main site
              const form = mainWindow.document.createElement('form');
              form.method = 'POST';
              form.action = 'https://incampusbwu.netlify.app/';
              
              // Add hidden fields for token and user
              const tokenField = mainWindow.document.createElement('input');
              tokenField.type = 'hidden';
              tokenField.name = 'token';
              tokenField.value = token;
              form.appendChild(tokenField);
              
              const userField = mainWindow.document.createElement('input');
              userField.type = 'hidden';
              userField.name = 'user';
              userField.value = JSON.stringify(user);
              form.appendChild(userField);
              
              // Submit the form
              mainWindow.document.body.appendChild(form);
              form.submit();
            } else {
              // If popup is blocked, provide a direct link
              document.getElementById('success-message').innerHTML = 'Login successful! <a href="https://incampusbwu.netlify.app/" target="_blank" class="text-blue-700 underline">Click here to open the main site</a>';
            }
          }, 1500);
        } else {
          showError(response.data.message || 'Login failed. Please try again.');
        }
      } catch (error) {
        console.error('Emergency login error:', error);
        showError(error.response?.data?.message || 'Login failed. Please try again.');
      } finally {
        // Reset button state
        loginBtn.textContent = 'Login';
        loginBtn.disabled = false;
      }
    });
    
    // Show error message
    function showError(message) {
      const errorElement = document.getElementById('error-message');
      errorElement.textContent = message;
      errorElement.classList.remove('hidden');
    }
    
    // Initialize the page
    document.addEventListener('DOMContentLoaded', function() {
      clearStorageItems();
      
      // Set a message if we were redirected here due to login issues
      const referrer = document.referrer;
      if (referrer && referrer.includes('incampusbwu.netlify.app')) {
        const messageElement = document.getElementById('message');
        messageElement.textContent = 'You were redirected here due to login issues. This is an emergency login page.';
        messageElement.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
